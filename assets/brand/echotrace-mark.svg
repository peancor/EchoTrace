<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-labelledby="title desc">
  <title id="title">EchoTrace mark</title>
  <desc id="desc">Abstract receiver node with echo traces and live signal paths.</desc>
  <defs>
    <linearGradient id="bg" x1="32" y1="20" x2="224" y2="236" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#122334"/>
      <stop offset="1" stop-color="#081017"/>
    </linearGradient>
    <linearGradient id="signal" x1="58" y1="74" x2="210" y2="188" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#5eead4"/>
      <stop offset="0.55" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#f2c14e"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="256" height="256" rx="48" fill="url(#bg)"/>
  <path d="M64 82h82c24 0 43 19 43 43s-19 43-43 43H94" fill="none" stroke="#1f3444" stroke-width="18" stroke-linecap="round"/>
  <path d="M64 82h82c24 0 43 19 43 43s-19 43-43 43H94" fill="none" stroke="url(#signal)" stroke-width="10" stroke-linecap="round" filter="url(#glow)"/>
  <path d="M64 128h86" fill="none" stroke="#5eead4" stroke-width="10" stroke-linecap="round" filter="url(#glow)"/>
  <path d="M64 174h70" fill="none" stroke="#38bdf8" stroke-width="10" stroke-linecap="round" filter="url(#glow)"/>
  <circle cx="189" cy="125" r="19" fill="#081017" stroke="#f2c14e" stroke-width="8" filter="url(#glow)"/>
  <circle cx="64" cy="82" r="8" fill="#5eead4"/>
  <circle cx="64" cy="128" r="8" fill="#5eead4"/>
  <circle cx="64" cy="174" r="8" fill="#38bdf8"/>
  <path d="M204 80c15 12 24 28 24 47s-9 35-24 47" fill="none" stroke="#5eead4" stroke-width="6" stroke-linecap="round" opacity="0.65"/>
  <path d="M220 60c22 17 36 41 36 67s-14 50-36 67" fill="none" stroke="#38bdf8" stroke-width="5" stroke-linecap="round" opacity="0.35"/>
</svg>
